opa":155000,"Desigual|Ropa":530000,"Fossil|Reloj":650000,"Ray-Ban|Gafas":700000,"Stanley|Hogar":280000,"Apple|Tecnología":3500000,"Samsung|Tecnología":1200000},RDEF={"Tenis/Zapatos":200000,"Botas":350000,"Bolso/Cartera":280000,"Reloj":380000,"Gafas":220000,"Ropa":110000,"Joyería":200000,"Hogar":180000,"Tecnología":350000,"Cosméticos":100000},DEPR={"Nuevo con etiquetas":0.72,"Nuevo sin etiquetas":0.65,"Muy bueno":0.55,"Bueno":0.43,"Satisfactorio":0.30},PRIMA=new Set(["Nike","Jordan","New Balance","adidas","Dr. Martens","Coach","Michael Kors","Ray-Ban","Kate Spade","GUESS","Tommy Hilfiger","Calvin Klein","Vans","Converse","Fossil","Desigual","Ralph Lauren","Tory Burch"]),PRIMB=new Set(["Puma","Reebok","FILA","Under Armour","Steve Madden","Nine West","American Eagle","Zara","GAP","Forever 21","Victoria's Secret","Express","Levi's","DKNY"]),TIPOS=["Tenis/Zapatos","Botas","Bolso/Cartera","Ropa","Reloj","Gafas","Joyería","Hogar","Tecnología","Cosméticos"],CONDS=["Nuevo con etiquetas","Nuevo sin etiquetas","Muy bueno","Bueno","Satisfactorio"];function getPot(b,t,c,h){let p=0.50;if(PRIMA.has(b))p+=0.25;else if(PRIMB.has(b))p+=0.12;p+={"Nuevo con etiquetas":0.15,"Nuevo sin etiquetas":0.10,"Muy bueno":0.08,"Bueno":0.03,"Satisfactorio":-0.05}[c]||0;if(["Tenis/Zapatos","Botas"].includes(t))p+=0.08;else if(["Bolso/Cartera","Reloj"].includes(t))p+=0.05;const n=Number(h)||0;p+=n>=50?0.10:n>=20?0.06:n>=10?0.02:0;return Math.min(Math.max(p,0.20),1.30);}function calc(b,t,c,h,usd,trm){const p=parseFloat(usd)||0;if(!p||c==="VENDIDO")return null;const pot=getPot(b,t,c,h),retail=RETAIL[b+"|"+t]||RDEF[t]||120000,tc=Math.round(p*trm),depr=DEPR[c]||0.50,n=Number(h)||0,hm=n>=50?1.15:n>=20?1.08:n>=10?1.04:1.0,pm=pot>=1.0?1.10:pot>=0.85?1.05:pot>=0.70?1.02:0.97,bep=Math.ceil((tc+GT_B)/(1-GT_A)/1000)*1000,pub=Math.max(Math.ceil(retail*depr*hm*pm/1000)*1000,Math.ceil(bep*1.15/1000)*1000),agr=pot>=0.90?0.82:pot>=0.70?0.79:pot>=0.55?0.76:0.73,oferta=Math.max(Math.ceil(pub*(n>=30?Math.min(agr+0.03,0.88):agr)/1000)*1000,bep),gt=Math.round(((oferta*GT_RATE)+GT_FIXED)*GT_IVA),gan=Math.round(oferta-tc),gf=Math.round(gan-gt);return{tc,retail,pub,oferta,gt,gan,gf,roi:tc>0?Math.round(gf/tc*1000)/10:0,pot:Math.round(pot*100),bep};}function fmt(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(n||0)}let S={phase:'idle',imgUrl:null,b64:null,mime:'image/jpeg',trm:TRM_DEF,err:null,copied:false,lmsg:'Analizando...',f:{brand:'',tipo:'Ropa',cond:'Muy bueno',size:'No visible',usd:'',hearts:0},res:null};function recalc(){S.res=calc(S.f.brand,S.f.tipo,S.f.cond,S.f.hearts,S.f.usd,S.trm)}async function analyze(b64,mime){const msgs=["Detectando marca...","Leyendo precio incl...","Analizando estado...","Calculando potencial..."];let mi=0;const iv=setInterval(()=>{S.lmsg=msgs[mi++%msgs.length];render()},900);try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Analyze this Vinted listing. Return ONLY JSON: {"brand":"brand name","tipo":"Tenis/Zapatos|Botas|Bolso/Cartera|Ropa|Reloj|Gafas|Joyería|Hogar|Tecnología|Cosméticos","condition":"Nuevo con etiquetas|Nuevo sin etiquetas|Muy bueno|Bueno|Satisfactorio|VENDIDO","size":"size or No visible","price_usd":numeric incl price,"hearts":numeric likes}'}]}]})});const d=await r.json();clearInterval(iv);const e=JSON.parse((d.content[0].text.match(/{[sS]*}/)||['{}'])[0]);S.f={brand:e.brand||'',tipo:TIPOS.includes(e.tipo)?e.tipo:'Ropa',cond:CONDS.includes(e.condition)?e.condition:'Muy bueno',size:e.size||'No visible',usd:String(e.price_usd||''),hearts:Number(e.hearts)||0};S.phase='done';recalc();render();}catch(ex){clearInterval(iv);S.err='Error. Intenta con foto más clara.';S.phase='idle';render();}}function processFile(f){if(!f||!f.type.st
